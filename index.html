<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Procedural Audio Lab</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background-color: #1e293b;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 24px;
            color: #38bdf8;
            margin-bottom: 5px;
            text-align: center;
        }
        p.desc {
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media(min-width: 768px) {
            .main-layout {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }
        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label {
            font-size: 14px;
            font-weight: 600;
            color: #f8fafc;
        }
        textarea {
            width: 100%;
            height: 340px;
            background-color: #020617;
            color: #38bdf8;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            padding: 15px;
            border: 1px solid #334155;
            border-radius: 8px;
            resize: vertical;
            outline: none;
        }
        textarea:focus {
            border-color: #38bdf8;
        }
        .action-bar {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-compile {
            background-color: #0284c7;
            color: white;
        }
        .btn-compile:hover {
            background-color: #0369a1;
        }
        .preview-section {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
        }
        .output-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sound-status {
            font-size: 15px;
            font-weight: 600;
            color: #f8fafc;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }
        .controls-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-play {
            background-color: #0ea5e9;
            color: white;
        }
        .btn-play:hover {
            background-color: #0284c7;
        }
        .btn-download {
            background-color: #10b981;
            color: white;
        }
        .btn-download:hover {
            background-color: #059669;
        }
        button:disabled {
            background-color: #334155 !important;
            color: #64748b !important;
            cursor: not-allowed;
        }
        .logs {
            background-color: #020617;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #ef4444;
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .logs.success {
            color: #10b981;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Procedural Audio Studio Workspace</h1>
    <p class="desc">Input custom Web Audio synthesis JavaScript logic below. Compile it dynamically to test real-time nodes and export clean WAV file waveforms.</p>
    
    <div class="main-layout">
        <!-- Editor View -->
        <div class="editor-section">
            <label for="code-input">Audio Synthesis Blueprint Structure</label>
            <textarea id="code-input" spellcheck="false">// Modify this logic block, then hit "Compile Sound System"!
// Injection globals available: 'ctx' (AudioContext structural base), 'duration' (seconds).
// Remember to return your output AudioNode node so the matrix can listen to it.

const outGain = ctx.createGain();
outGain.gain.setValueAtTime(0.4, ctx.currentTime);

// Example Blueprint: Electronic Synth Chirp Sweep
const osc = ctx.createOscillator();
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(1500, ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.35);

outGain.gain.setValueAtTime(0.4, ctx.currentTime);
outGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);

osc.connect(outGain);
osc.start(ctx.currentTime);
osc.stop(ctx.currentTime + 0.35);

return outGain;</textarea>
            <div class="action-bar">
                <button class="btn-compile" onclick="compileCode()">⚙ Compile Sound System</button>
            </div>
        </div>

        <!-- Realtime Interactive Dashboard -->
        <div class="preview-section">
            <div class="output-card">
                <div class="sound-status" id="system-status">System Status: Idle</div>
                <div class="controls-grid">
                    <button id="play-btn" class="btn-play" onclick="executePlayback()" disabled>▶ Run Audio Engine</button>
                    <button id="download-btn" class="btn-download" onclick="executeDownload()" disabled>⭳ Export Lossless WAV</button>
                </div>
            </div>
            
            <div>
                <label style="font-size:12px; color:#94a3b8; display:block; margin-bottom:4px;">Console Sandbox Logs</label>
                <div id="console-output" class="logs success">System initialized. Ready for code parsing input...</div>
            </div>
        </div>
    </div>
</div>

<script>
    let SAMPLE_RATE = 44100;
    let compiledFunctionBlueprint = null;
    let activeAudioCtx = null;

    function logMessage(msg, isError = false) {
        const consoleEl = document.getElementById('console-output');
        consoleEl.innerText = msg;
        if (isError) {
            consoleEl.classList.remove('success');
        } else {
            consoleEl.classList.add('success');
        }
    }

    function compileCode() {
        const rawCode = document.getElementById('code-input').value;
        try {
            // Uses dynamic JavaScript reflection to map the textarea value into an executable function
            compiledFunctionBlueprint = new Function('ctx', 'duration', rawCode);
            
            document.getElementById('play-btn').disabled = false;
            document.getElementById('download-btn').disabled = false;
            document.getElementById('system-status').innerText = "System Status: Compiled & Ready";
            logMessage("Compilation successful! Object parsing valid with dependencies injected.");
        } catch (err) {
            compiledFunctionBlueprint = null;
            document.getElementById('play-btn').disabled = true;
            document.getElementById('download-btn').disabled = true;
            document.getElementById('system-status').innerText = "System Status: Execution Blocked";
            logMessage(`Syntax Parsing Error:\n${err.message}`, true);
        }
    }

    function executePlayback() {
        if (!compiledFunctionBlueprint) return;
        if (!activeAudioCtx) {
            activeAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        try {
            logMessage("Spawning active node graphs...");
            const node = compiledFunctionBlueprint(activeAudioCtx, 2.5);
            if (node && typeof node.connect === 'function') {
                node.connect(activeAudioCtx.destination);
            } else {
                logMessage("Warning: Execution occurred, but no functional AudioNode was returned by the script template.", true);
            }
        } catch (err) {
            logMessage(`Runtime Playback Error:\n${err.message}`, true);
        }
    }

    function executeDownload() {
        if (!compiledFunctionBlueprint) return;
        const duration = 2.5; 
        
        logMessage("Baking procedural timeline directly to microsecond floating-point buffers...");
        const offlineCtx = new OfflineAudioContext(1, SAMPLE_RATE * duration, SAMPLE_RATE);
        
        try {
            const node = compiledFunctionBlueprint(offlineCtx, duration);
            if (node && typeof node.connect === 'function') {
                node.connect(offlineCtx.destination);
            }
            
            offlineCtx.startRendering().then(renderedBuffer => {
                const wavBlob = convertBufferToWavData(renderedBuffer);
                const url = URL.createObjectURL(wavBlob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = "procedural_synth_render.wav";
                a.click();
                URL.revokeObjectURL(url);
                logMessage("File exported successfully as procedural_synth_render.wav");
            }).catch(err => {
                logMessage(`Offline Buffer Error:\n${err.message}`, true);
            });
        } catch (err) {
            logMessage(`Runtime Structural Rendering Error:\n${err.message}`, true);
        }
    }

    function convertBufferToWavData(buffer) {
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1; 
        const bitDepth = 16;
        const result = buffer.getChannelData(0);
        const bufferLength = result.length;
        const arrayBuffer = new ArrayBuffer(44 + bufferLength * 2);
        const view = new DataView(arrayBuffer);
        
        writeHeaderString(view, 0, 'RIFF');
        view.setUint32(4, 36 + bufferLength * 2, true);
        writeHeaderString(view, 8, 'WAVE');
        writeHeaderString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
        view.setUint16(32, numChannels * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeHeaderString(view, 36, 'data');
        view.setUint32(40, bufferLength * 2, true);
        
        let offset = 44;
        for (let i = 0; i < bufferLength; i++, offset += 2) {
            let s = Math.max(-1, Math.min(1, result[i]));
            view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([view], { type: 'audio/wav' });
    }

    function writeHeaderString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }
</script>
</body>
</html>
